
name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'   # only run when docs changes (same as GitLab)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll
        run: |
          cd docs
          bundle install
          bundle exec jekyll build -d ../public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
